<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flower Website</title>
        <link rel="stylesheet" href="styles/index.css" />
    </head>
    <body>
        <header class="header">
            <div class="header-container">
                <div>
                    <img src="assets/logo.png" alt="" />
                </div>
                <div>
                    <nav>
                        <ul>
                            <li>Home</li>
                            <li class="color">Shop</li>
                            <li class="color">About Us</li>
                            <li>Cart($56)</li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>
        <main>
            <section class="banner">
                <div class="banner-container">
                    <div>
                        <h3 class="banner-title">
                            ALWAYS <span class="oranges">FRESH</span> <br />
                            <span class="oranges">FLOWERS</span>
                        </h3>
                        <p class="banner-description">
                            Indulge your senses with the beauty and fragrance of
                            our fresh flower shop. From classic roses to exotic
                            blooms, we offer a wide variety of fresh flowers
                            that are perfect for any occasion.
                        </p>
                    </div>
                    <div>
                        <img src="assets/hero-flower.png" alt="" />
                    </div>
                </div>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
